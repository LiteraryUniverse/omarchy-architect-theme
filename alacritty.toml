# Architect — Alacritty
# Art Deco: pure obsidian, platinum, champagne gold, chrome silver, LU pink

[colors.primary]
background = "#0E0D0D"
foreground = "#EDE8E0"
dim_foreground = "#7A7870"

[colors.cursor]
text = "#0E0D0D"
cursor = "#C9A84C"

[colors.vi_mode_cursor]
text = "#0E0D0D"
cursor = "#C9A84C"

[colors.search.matches]
foreground = "#0E0D0D"
background = "#C9A84C"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#0E0D0D"
background = "#C9A84C"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

