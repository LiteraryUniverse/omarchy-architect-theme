# Architect — Hyprland
# Art Deco: zero rounding, gold borders, crisp geometric animations
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(C9A84Cee) rgba(EDE8E0ee) 90deg

general {
    col.active_border = $activeBorderColor
    border_size = 2
    gaps_in = 3
    gaps_out = 2
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 0
    rounding_power = 2
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    }
    blur {
        enabled = true
        size = 2
        passes = 4
        contrast = 1.0
        brightness = 0.9
        vibrancy = 0.1
        vibrancy_darkness = 0.4
        noise = 0.02
        ignore_opacity = true
    }
}

# Mechanical, precise animations — pure Art Deco
animations {
    enabled = yes

    bezier = steelIn,   0.00, 0.00, 0.10, 1.00
    bezier = steelFade, 0.10, 0.00, 0.10, 1.00

    animation = windows,          1, 1.8, steelIn
    animation = windowsIn,        1, 1.6, steelIn,   slide
    animation = windowsOut,       1, 1.4, steelFade, slide
    animation = windowsMove,      1, 2.0, steelIn

    animation = fade,             1, 1.6, steelFade
    animation = fadeIn,           1, 1.4, steelIn
    animation = fadeOut,          1, 1.2, steelFade
    animation = fadeDim,          1, 1.2, steelFade

    animation = layers,           1, 1.6, steelIn
    animation = layersIn,         1, 1.4, steelIn,   fade
    animation = layersOut,        1, 1.2, steelFade, fade

    animation = workspaces,       1, 1.8, steelIn,   slide
    animation = specialWorkspace, 1, 1.6, steelIn,   slidevert

    animation = border,           1, 2.0, steelIn
    animation = borderangle,      1, 2.2, steelIn
    animation = fadeSwitch,       1, 1.0, steelFade
}

